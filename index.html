<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私の最初のホームページ</title>
    <style>
        /* ページ全体のスタイル設定 */
        body {
            background-color: #e0f7fa; /* 薄い青色 */
            color: #333333;            /* 濃い灰色 */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        /* プロフィールカードのコンテナ */
        .profile-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
        }

        /* 見出しのスタイル */
        h1 {
            color: #00838f; /* アクセントに少し濃いめの青緑 */
            font-size: 24px;
            border-bottom: 2px solid #b2ebf2;
            padding-bottom: 10px;
            margin-top: 0;
        }

        /* 各項目のラベル（名前、学部など） */
        .label {
            font-weight: bold;
            color: #006064;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        /* 趣味のリストスタイル */
        ul {
            margin: 0;
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>ようこそ！</h1>
        
        <div class="label">名前</div>
        <p>山田 太郎 (ご自身の名前に置き換えてください)</p>

        <div class="label">学部学科</div>
        <p>〇〇学部 〇〇学科 (ご自身の学部学科に置き換えてください)</p>

        <div class="label">趣味</div>
        <ul>
            <li>映画鑑賞（特にSF映画が好きです）</li>
            <li>旅行（国内の温泉巡り）</li>
            <li>写真撮影（散歩しながら風景を撮ります）</li>
        </ul>
    </div>

</body>
</html>
